# ================================================================
# Nginx — Configuration PRODUCTION avec HTTPS (Let's Encrypt)
# Remplacer : votre-domaine.com par votre vrai domaine
# ================================================================

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name votre-domaine.com www.votre-domaine.com;

    # Let's Encrypt challenge (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Serveur HTTPS principal
server {
    listen 443 ssl http2;
    server_name votre-domaine.com www.votre-domaine.com;

    # ── Certificats Let's Encrypt (gérés par Certbot) ──────────
    ssl_certificate     /etc/letsencrypt/live/votre-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votre-domaine.com/privkey.pem;

    # ── Sécurité SSL renforcée ──────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # ── En-têtes de sécurité ────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                             always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    # ── Taille max des uploads (APK MobSF) ─────────────────────
    client_max_body_size 200M;

    # ── Compression gzip ────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ────────────────────────────────────────────────────────────
    # FRONTEND React/Vite
    # ────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;

        # Cache des assets statiques React
        proxy_cache_bypass $http_upgrade;
    }

    # ────────────────────────────────────────────────────────────
    # BACKEND API Spring Boot
    # ────────────────────────────────────────────────────────────
    location /api {
        proxy_pass         http://backend:8081/api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;

        # Timeouts étendus pour les scans SAST longs
        proxy_read_timeout    600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
    }

    # ── Spring Boot Actuator (health check interne uniquement) ──
    location /actuator {
        proxy_pass       http://backend:8081/actuator;
        proxy_set_header Host $host;
        # Restreindre l'accès aux IPs internes en production
        # allow 127.0.0.1;
        # deny all;
    }

    # ────────────────────────────────────────────────────────────
    # SWAGGER UI / OpenAPI
    # ────────────────────────────────────────────────────────────
    location /swagger-ui {
        proxy_pass       http://backend:8081/swagger-ui;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /v3/api-docs {
        proxy_pass       http://backend:8081/v3/api-docs;
        proxy_set_header Host $host;
    }

    # ────────────────────────────────────────────────────────────
    # MOBSF — Scanner APK
    # ────────────────────────────────────────────────────────────
    location /mobsf/ {
        proxy_pass         http://mobsf:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    # ────────────────────────────────────────────────────────────
    # PAGE D'ERREUR PERSONNALISÉE
    # ────────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
