version: '3.8'

# Development Docker Compose configuration with additional tools
# Usage: docker-compose -f docker-compose.dev.yml up -d

services:
  # PostgreSQL Database with pgAdmin for management
  postgres:
    image: postgres:16-alpine
    container_name: vuln_scanner_db_dev
    environment:
      POSTGRES_DB: ${DB_NAME:-vuln_scanner}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vuln_scanner_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vuln_scanner}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - PostgreSQL Management Tool
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vuln_scanner_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - vuln_scanner_network
    depends_on:
      - postgres

  # Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vuln_scanner_backend_dev
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-vuln_scanner}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-admin}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081
      SPRING_PROFILES_ACTIVE: dev
      JAVA_OPTS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    ports:
      - "8081:8081"
      - "5005:5005"  # Debug port
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vuln_scanner_network
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/src:/app/src  # For live reload (requires Spring Dev Tools)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
    driver: local

networks:
  vuln_scanner_network:
    driver: bridge
