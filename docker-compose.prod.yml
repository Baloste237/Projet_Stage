version: '3.8'

# Production Docker Compose configuration
# ⚠️ Security Notes:
# - Use strong passwords for all services
# - Never expose debug ports
# - Use external secrets management
# - Use restart policies
# - Add resource limits
# - Use specific image versions (no 'latest' tags)

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vuln_scanner_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-vuln_scanner}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}  # MUST be set in .env
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vuln_scanner_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vuln_scanner}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vuln_scanner_backend_prod
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-vuln_scanner}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}  # MUST be set in .env
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081
      JAVA_OPTS: -Xmx1024m -Xms512m -XX:+UseG1GC
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vuln_scanner_network
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G

volumes:
  postgres_data_prod:
    driver: local

networks:
  vuln_scanner_network:
    driver: bridge
