spring.application.name=backend
spring.datasource.url=jdbc:postgresql://localhost:5433/vuln_scanner
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver

# Multipart configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8081

# OAuth2 Client Configurations
# ⚠️ REMPLACEZ CES VALEURS PAR VOS VRAIES CLÉS API !

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=google-client-id-placeholder
spring.security.oauth2.client.registration.google.client-secret=google-client-secret-placeholder
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/login/oauth2/code/google

# GitHub OAuth2
spring.security.oauth2.client.registration.github.client-id=github-client-id-placeholder
spring.security.oauth2.client.registration.github.client-secret=github-client-secret-placeholder
spring.security.oauth2.client.registration.github.scope=user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8081/login/oauth2/code/github

# GitLab OAuth2
spring.security.oauth2.client.registration.gitlab.client-id=gitlab-client-id-placeholder
spring.security.oauth2.client.registration.gitlab.client-secret=gitlab-client-secret-placeholder
spring.security.oauth2.client.registration.gitlab.scope=read_user,read_api
spring.security.oauth2.client.registration.gitlab.redirect-uri=http://localhost:8081/login/oauth2/code/gitlab
spring.security.oauth2.client.provider.gitlab.authorization-uri=https://gitlab.com/oauth/authorize
spring.security.oauth2.client.provider.gitlab.token-uri=https://gitlab.com/oauth/token
spring.security.oauth2.client.provider.gitlab.user-info-uri=https://gitlab.com/api/v4/user
spring.security.oauth2.client.provider.gitlab.user-name-attribute=username

