apiVersion: 1

datasources:
  # ── Source de données : Prometheus (Métriques) ───────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: "15s"

  # ── Source de données : Loki (Logs) ──────────────────────────
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      maxLines: 1000
