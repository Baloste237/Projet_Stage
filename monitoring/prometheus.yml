global:
  scrape_interval:     15s   # Fréquence de collecte des métriques
  evaluation_interval: 15s   # Fréquence d'évaluation des règles d'alerte
  scrape_timeout:      10s

# ── Fichiers de règles d'alerte ────────────────────────────────
rule_files:
  - "alerts/*.yml"

# ── Alertmanager (optionnel) ────────────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Cibles de scraping ─────────────────────────────────────────
scrape_configs:

  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Backend Spring Boot (Actuator + Micrometer) ────────────
  - job_name: 'aisecurescan-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['backend:8081']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'backend-spring-boot'

  # ── SAST Engine FastAPI Python ──────────────────────────────
  - job_name: 'aisecurescan-sast'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['sast_engine:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'sast-engine-fastapi'

  # ── PostgreSQL (via postgres_exporter) ──────────────────────
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgresql-16'

  # ── Nginx (via nginx-prometheus-exporter) ───────────────────
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'nginx-reverse-proxy'

  # ── Node Exporter (métriques système VM) ───────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ubuntu-server'

  # ── cAdvisor (métriques conteneurs Docker) ─────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'docker-cadvisor'
